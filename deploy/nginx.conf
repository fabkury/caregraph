# CareGraph Nginx configuration
# Place at /etc/nginx/sites-available/caregraph.conf
# Symlink to /etc/nginx/sites-enabled/caregraph.conf

server {
    listen 80;
    server_name caregraph.org www.caregraph.org;
    return 301 https://caregraph.org$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.caregraph.org;

    ssl_certificate /etc/letsencrypt/live/caregraph.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caregraph.org/privkey.pem;

    return 301 https://caregraph.org$request_uri;
}

server {
    listen 443 ssl http2;
    server_name caregraph.org;

    ssl_certificate /etc/letsencrypt/live/caregraph.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caregraph.org/privkey.pem;

    root /var/www/caregraph/current;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Long-lived immutable cache for content-hashed assets.
    location ~* \.(parquet|json|js|css|woff2|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache on the HTML shell.
    location / {
        expires 5m;
        try_files $uri $uri/ $uri.html =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Error pages
    error_page 404 /404.html;
}
